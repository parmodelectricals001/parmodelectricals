<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parmod Electricals – Electrical Turnkey Projects & Maintenance | Since 2001</title>
<meta name="description" content="Parmod Electricals - ISO Certified electrical contractor for turnkey projects, repair & maintenance, and custom panel manufacturing in Faridabad. Pan India service.">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary:#1e40af;--primary-light:#3b82f6;--primary-lighter:#60a5fa;--primary-dark:#1e3a8a;
  --secondary:#dc2626;--secondary-light:#ef4444;
  --accent:#f59e0b;--accent-light:#fbbf24;
  --dark:#1f2937;--dark-light:#374151;--gray:#6b7280;--gray-light:#9ca3af;
  --light:#f8fafc;--light-blue:#eff6ff;--light-gray:#f3f4f6;--white:#ffffff;
  --shadow:0 10px 40px rgba(0,0,0,.08);--shadow-lg:0 25px 60px rgba(0,0,0,.12);
}
html{scroll-behavior:smooth;}
body{font-family:'Montserrat',sans-serif;line-height:1.7;color:var(--dark);background:var(--white);overflow-x:hidden;}


/* LOGO ENHANCED */
.logo-enhanced { display:flex; align-items:center; gap:14px; text-decoration:none; }
.logo-img-wrap { position:relative; display:flex; align-items:center; }
.logo-img-wrap img { height:58px; filter:drop-shadow(0 2px 8px rgba(30,64,175,0.18)); transition:.3s; }
.logo-enhanced:hover .logo-img-wrap img { filter:drop-shadow(0 4px 16px rgba(220,38,38,0.35)) brightness(1.04); transform:scale(1.03); }
.logo-name { display:flex; flex-direction:column; line-height:1.15; }
.logo-name-main { font-family:'Montserrat',sans-serif; font-size:1.45rem; font-weight:900; color:var(--primary-dark); letter-spacing:.5px; text-transform:uppercase; }
.logo-name-main span { color:var(--secondary); }
.logo-name-sub { font-family:'Playfair Display',serif; font-style:italic; font-size:.72rem; color:var(--gray); letter-spacing:.3px; }

/* PRELOADER */
.preloader{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;justify-content:center;align-items:center;z-index:99999;transition:all .6s ease;}
.preloader.hidden{opacity:0;visibility:hidden;}
.preloader-content{text-align:center;}
.preloader-logo{margin-bottom:30px;animation:pulse-logo 1.5s ease infinite;}
.preloader-logo img{height:70px;filter:brightness(10);}
.preloader-text{color:rgba(255,255,255,.7);font-size:.9rem;font-weight:500;letter-spacing:2px;text-transform:uppercase;margin-bottom:20px;}
.preloader-bar{width:200px;height:4px;background:rgba(255,255,255,.2);border-radius:4px;overflow:hidden;margin:0 auto;}
.preloader-bar::after{content:'';display:block;width:50%;height:100%;background:var(--accent);animation:loading 1.5s ease infinite;}
@keyframes pulse-logo{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
@keyframes loading{0%{transform:translateX(-100%);}100%{transform:translateX(300%);}}

/* TOP BAR */
.top-bar{background:var(--primary);color:var(--white);padding:10px 0;font-size:.82rem;}
.top-bar .container{display:flex;justify-content:flex-end;align-items:center;flex-wrap:wrap;gap:10px;}
.top-bar-left{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
.top-bar a{color:var(--white);text-decoration:none;display:flex;align-items:center;gap:7px;transition:.3s;font-weight:500;}
.top-bar a:hover{color:var(--accent);}
.top-bar i{color:var(--accent);font-size:.85rem;}
.social-icons{display:flex;gap:8px;}
.social-icons a{width:30px;height:30px;background:rgba(255,255,255,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;transition:.3s;}
.social-icons a:hover{background:var(--accent);transform:translateY(-2px);}

/* HEADER */
header{background:var(--white);box-shadow:0 2px 20px rgba(0,0,0,.06);position:sticky;top:0;z-index:1000;}
.header-main{padding:12px 0;}
.header-main .container{display:flex;justify-content:space-between;align-items:center;}
.logo{display:flex;align-items:center;text-decoration:none;}
.logo img{height:54px;}
nav{display:flex;align-items:center;gap:10px;}
nav ul{display:flex;list-style:none;gap:3px;margin-right:15px;}
nav ul li a{padding:10px 16px;text-decoration:none;color:var(--dark);font-weight:600;font-size:.88rem;border-radius:8px;transition:.3s;display:block;}
nav ul li a:hover,nav ul li a.active{background:var(--primary);color:var(--white);}
.header-cta{display:flex;gap:8px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:8px;text-decoration:none;font-weight:700;font-size:.88rem;transition:.3s;cursor:pointer;border:none;font-family:inherit;letter-spacing:.3px;}
.btn-primary{background:linear-gradient(135deg,var(--secondary),var(--secondary-light));color:var(--white);box-shadow:0 4px 15px rgba(220,38,38,.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(220,38,38,.4);}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary);}
.btn-outline:hover{background:var(--primary);color:var(--white);}
.btn-whatsapp{background:linear-gradient(135deg,#25D366,#128C7E);color:var(--white);box-shadow:0 4px 15px rgba(37,211,102,.3);}
.btn-whatsapp:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(37,211,102,.4);}
.btn-accent{background:linear-gradient(135deg,var(--accent),var(--accent-light));color:var(--dark);box-shadow:0 4px 15px rgba(245,158,11,.3);}
.btn-accent:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(245,158,11,.4);}
.menu-toggle{display:none;flex-direction:column;cursor:pointer;padding:8px;gap:5px;}
.menu-toggle span{width:26px;height:2.5px;background:var(--primary);border-radius:2px;transition:.3s;}

/* CONTAINER */
.container{max-width:1280px;margin:0 auto;padding:0 20px;}
section{padding:90px 0;}

/* SECTION HEADER */
.section-header{text-align:center;margin-bottom:60px;}
.section-header .subtitle{display:inline-flex;align-items:center;gap:12px;color:var(--primary);font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:3px;margin-bottom:15px;}
.section-header .subtitle::before,.section-header .subtitle::after{content:'';width:40px;height:2px;background:var(--primary);border-radius:2px;}
.section-header h2{font-size:2.4rem;color:var(--dark);margin-bottom:15px;line-height:1.2;font-weight:800;}
.section-header h2 span{color:var(--primary);}
.section-header p{color:var(--gray);font-size:1rem;max-width:600px;margin:0 auto;}

/* ANIMATIONS */
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeInRight{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
@keyframes fadeInLeft{from{opacity:0;transform:translateX(-40px);}to{opacity:1;transform:translateX(0);}}

/* HERO */
.hero{background:linear-gradient(135deg,var(--light-blue) 0%,var(--white) 50%,var(--light) 100%);min-height:90vh;display:flex;align-items:center;position:relative;overflow:hidden;padding:80px 0;}
.hero::before{content:'';position:absolute;top:-50%;right:-20%;width:70%;height:200%;background:radial-gradient(ellipse,rgba(59,130,246,.08) 0%,transparent 60%);}
.hero-content{display:grid;grid-template-columns:1fr 1fr;gap:60px;align-items:center;position:relative;z-index:1;}
.hero-badge{display:inline-flex;align-items:center;gap:10px;background:var(--white);padding:10px 20px;border-radius:50px;border:2px solid var(--primary-light);margin-bottom:20px;box-shadow:var(--shadow);animation:fadeInUp .8s ease;}
.hero-badge i{color:var(--accent);}
.hero-badge span{color:var(--primary);font-size:.88rem;font-weight:700;}
.hero-text h1{font-size:3rem;color:var(--dark);margin-bottom:18px;line-height:1.15;font-weight:800;animation:fadeInUp .8s ease .1s both;}
.hero-text h1 span{color:var(--primary);}
.hero-text .tagline{font-family:'Playfair Display',serif;font-style:italic;font-size:1.2rem;color:var(--secondary);margin-bottom:18px;animation:fadeInUp .8s ease .2s both;}
.hero-text p{font-size:1rem;color:var(--gray);margin-bottom:28px;animation:fadeInUp .8s ease .3s both;max-width:500px;}
.hero-stats{display:flex;gap:20px;margin-bottom:30px;animation:fadeInUp .8s ease .4s both;flex-wrap:wrap;}
.hero-stat{text-align:center;padding:18px 22px;background:var(--white);border-radius:16px;box-shadow:var(--shadow);min-width:95px;}
.hero-stat h3{font-size:2.2rem;color:var(--primary);font-weight:800;line-height:1;}
.hero-stat p{font-size:.7rem;color:var(--gray);margin:4px 0 0;text-transform:uppercase;letter-spacing:1px;}
.hero-buttons{display:flex;gap:12px;flex-wrap:wrap;animation:fadeInUp .8s ease .5s both;}
.hero-image{animation:fadeInRight .8s ease .4s both;}
.hero-image-wrapper{position:relative;border-radius:24px;overflow:hidden;box-shadow:var(--shadow-lg);}
.hero-image-placeholder{width:100%;height:480px;position:relative;overflow:hidden;border-radius:24px;}
.hero-image-placeholder i{display:none;}
.hero-overlay-card{position:absolute;bottom:20px;left:20px;right:20px;background:rgba(255,255,255,.96);backdrop-filter:blur(10px);padding:22px;border-radius:16px;}
.hero-overlay-card h4{color:var(--primary);font-size:1rem;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.hero-overlay-card h4 i{color:var(--accent);}
.hero-services{display:flex;flex-wrap:wrap;gap:8px;}
.hero-services span{background:var(--light-blue);color:var(--primary);padding:6px 14px;border-radius:20px;font-size:.75rem;font-weight:600;}

/* BRANDS MARQUEE */
.brands-section{background:var(--white);padding:50px 0;border-top:1px solid var(--light-gray);border-bottom:1px solid var(--light-gray);overflow:hidden;}
.brands-title{text-align:center;margin-bottom:35px;}
.brands-title h3{font-size:.85rem;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:3px;}
.brands-title h2{font-size:1.8rem;color:var(--dark);font-weight:800;margin-top:6px;}
.brands-title h2 span{color:var(--primary);}
.marquee-wrap{position:relative;overflow:hidden;}
.marquee-wrap::before,.marquee-wrap::after{content:'';position:absolute;top:0;bottom:0;width:140px;z-index:2;pointer-events:none;}
.marquee-wrap::before{left:0;background:linear-gradient(to right,var(--white),transparent);}
.marquee-wrap::after{right:0;background:linear-gradient(to left,var(--white),transparent);}
.marquee-row{display:flex;gap:16px;margin-bottom:16px;animation:marq-ltr 45s linear infinite;width:max-content;}
.marquee-row.rev{animation:marq-rtl 45s linear infinite;margin-bottom:0;}
.marquee-row:hover{animation-play-state:paused;}
@keyframes marq-ltr{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
@keyframes marq-rtl{0%{transform:translateX(-50%);}100%{transform:translateX(0);}}
.brand-logo-card{flex-shrink:0;width:160px;height:80px;background:var(--light);border:2px solid transparent;border-radius:12px;display:flex;align-items:center;justify-content:center;padding:12px 18px;transition:.3s;cursor:default;}
.brand-logo-card:hover{border-color:var(--primary-light);transform:translateY(-4px);box-shadow:var(--shadow);background:var(--white);}
.brand-logo-card img{max-width:100%;max-height:44px;object-fit:contain;}

/* ABOUT */
.about{background:var(--light);}
.about-content{display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;}
.about-image{position:relative;}
.about-img-wrapper{position:relative;border-radius:24px;overflow:hidden;box-shadow:var(--shadow-lg);}
.about-img-placeholder{width:100%;height:480px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));display:flex;align-items:center;justify-content:center;}
.about-img-placeholder i{font-size:6rem;color:rgba(255,255,255,.12);}
.about-badge-float{position:absolute;bottom:-20px;right:-20px;background:linear-gradient(135deg,var(--accent),var(--accent-light));color:var(--dark);padding:22px 28px;border-radius:18px;text-align:center;box-shadow:0 15px 40px rgba(245,158,11,.4);z-index:2;}
.about-badge-float h4{font-size:2.5rem;font-weight:800;line-height:1;}
.about-badge-float p{font-size:.8rem;font-weight:600;margin-top:4px;}
.exp-card{position:absolute;top:20px;left:-25px;background:var(--white);padding:18px 22px;border-radius:14px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;z-index:2;}
.exp-card .exp-ico{width:46px;height:46px;background:linear-gradient(135deg,var(--secondary),var(--secondary-light));border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--white);font-size:1.2rem;}
.exp-card h5{font-size:1.1rem;color:var(--dark);font-weight:700;}
.exp-card p{font-size:.75rem;color:var(--gray);margin:0;}
.about-text .about-subtitle{color:var(--primary);font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px;}
.about-text h2{font-size:2.1rem;color:var(--dark);margin-bottom:22px;line-height:1.3;font-weight:800;}
.about-text h2 span{color:var(--primary);}
.about-text p{color:var(--gray);margin-bottom:16px;text-align:justify;}
.about-highlight{background:linear-gradient(90deg,rgba(30,64,175,.08),transparent);border-left:4px solid var(--primary);padding:18px 20px;margin:22px 0;border-radius:0 12px 12px 0;}
.about-highlight p{margin:0;font-weight:600;color:var(--dark);font-style:italic;}
.about-features{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-top:28px;}
.about-feature{display:flex;align-items:flex-start;gap:14px;}
.about-feature .icon{width:46px;height:46px;background:var(--primary);color:var(--white);display:flex;align-items:center;justify-content:center;border-radius:10px;font-size:1.1rem;flex-shrink:0;}
.about-feature h5{font-size:.95rem;color:var(--dark);margin-bottom:4px;font-weight:700;}
.about-feature p{font-size:.82rem;color:var(--gray);margin:0;}

/* SERVICES */
.services{background:var(--light);}
.services-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px;}
.service-card{background:var(--white);border-radius:20px;padding:38px 28px;transition:.4s;border:2px solid transparent;position:relative;overflow:hidden;}
.service-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--primary),var(--accent));transform:scaleX(0);transition:.4s;}
.service-card:hover::before{transform:scaleX(1);}
.service-card:hover{border-color:var(--primary-light);transform:translateY(-8px);box-shadow:var(--shadow-lg);}
.service-icon{width:70px;height:70px;background:linear-gradient(135deg,var(--primary),var(--primary-light));border-radius:18px;display:flex;align-items:center;justify-content:center;margin-bottom:22px;transition:.4s;}
.service-card:hover .service-icon{transform:scale(1.1) rotate(-5deg);}
.service-icon i{font-size:1.8rem;color:var(--white);}
.service-card h3{font-size:1.15rem;color:var(--dark);margin-bottom:12px;font-weight:700;}
.service-card p{color:var(--gray);font-size:.88rem;line-height:1.7;}
.service-card .learn-more{display:inline-flex;align-items:center;gap:6px;color:var(--primary);font-weight:600;font-size:.85rem;margin-top:16px;text-decoration:none;transition:.3s;}
.service-card .learn-more:hover{gap:10px;}

/* PRODUCTS / PANELS */
.panels{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);position:relative;overflow:hidden;}
.panels::before{content:'';position:absolute;top:-50%;right:-20%;width:60%;height:200%;background:radial-gradient(ellipse,rgba(255,255,255,.05) 0%,transparent 60%);}
.panels .section-header h2{color:var(--white);}
.panels .section-header .subtitle{color:var(--accent);}
.panels .section-header .subtitle::before,.panels .section-header .subtitle::after{background:var(--accent);}
.panels .section-header p{color:rgba(255,255,255,.75);}
.panels-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;position:relative;z-index:1;}
.panel-card{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border-radius:20px;overflow:hidden;border:1px solid rgba(255,255,255,.15);transition:.4s;}
.panel-card:hover{background:rgba(255,255,255,.16);transform:translateY(-10px);border-color:var(--accent);box-shadow:0 20px 50px rgba(0,0,0,.3);}
.panel-img{height:200px;background:rgba(255,255,255,.06);display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;}
.panel-img img{width:100%;height:100%;object-fit:cover;transition:.5s;}
.panel-card:hover .panel-img img{transform:scale(1.08);}
.panel-img i{font-size:3.5rem;color:rgba(255,255,255,.25);}
.panel-info{padding:24px;text-align:center;}
.panel-info h4{color:var(--white);font-size:1.1rem;margin-bottom:10px;font-weight:700;}
.panel-info p{color:rgba(255,255,255,.68);font-size:.88rem;line-height:1.6;}
.panel-tag{display:inline-block;background:var(--accent);color:var(--dark);padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:700;margin-top:10px;}

/* WIRES & CABLES */
.wires{background:var(--white);}
.wires-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
.wire-card{background:var(--light);border-radius:16px;padding:28px;text-align:center;transition:.3s;border:2px solid transparent;}
.wire-card:hover{border-color:var(--secondary);transform:translateY(-5px);box-shadow:var(--shadow);background:var(--white);}
.wire-icon{width:66px;height:66px;background:linear-gradient(135deg,var(--secondary),var(--secondary-light));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;}
.wire-icon i{font-size:1.7rem;color:var(--white);}
.wire-card h5{font-size:1rem;color:var(--dark);margin-bottom:8px;font-weight:700;}
.wire-card p{font-size:.83rem;color:var(--gray);}

/* WHY CHOOSE US */
.why{background:var(--light-blue);}
.why-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}
.why-card{background:var(--white);border-radius:20px;padding:36px 24px;text-align:center;transition:.4s;border:2px solid transparent;}
.why-card:hover{border-color:var(--primary-light);transform:translateY(-10px);box-shadow:var(--shadow-lg);}
.why-icon{width:80px;height:80px;background:linear-gradient(135deg,var(--accent),var(--accent-light));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px;transition:.4s;}
.why-card:hover .why-icon{transform:scale(1.1);}
.why-icon i{font-size:2rem;color:var(--dark);}
.why-card h4{font-size:1.1rem;color:var(--dark);margin-bottom:12px;font-weight:700;}
.why-card p{color:var(--gray);font-size:.88rem;}

/* GALLERY */
.gallery{background:var(--white);}
.gallery-placeholder{border:2px dashed var(--light-gray);border-radius:20px;padding:80px 40px;text-align:center;background:var(--light);}
.gallery-placeholder i{font-size:4rem;color:var(--gray-light);margin-bottom:20px;}
.gallery-placeholder h3{font-size:1.5rem;color:var(--dark);margin-bottom:10px;font-weight:700;}
.gallery-placeholder p{color:var(--gray);}

/* CONTACT */
.contact{background:var(--light);}
.contact-wrapper{display:grid;grid-template-columns:1fr 1.2fr;gap:40px;}
.contact-info{background:linear-gradient(135deg,var(--primary),var(--primary-dark));padding:48px;border-radius:24px;color:var(--white);}
.contact-info h3{font-size:1.7rem;margin-bottom:8px;font-weight:800;}
.contact-info .tagline{font-family:'Playfair Display',serif;font-style:italic;color:var(--accent);margin-bottom:28px;font-size:1rem;}
.contact-item{display:flex;align-items:flex-start;gap:18px;margin-bottom:24px;}
.contact-item .icon{width:48px;height:48px;background:rgba(255,255,255,.1);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--accent);flex-shrink:0;}
.contact-item h5{font-size:.95rem;margin-bottom:6px;font-weight:700;}
.contact-item p,.contact-item a{color:rgba(255,255,255,.8);text-decoration:none;font-size:.9rem;line-height:1.6;}
.contact-item a:hover{color:var(--accent);}
.contact-social{margin-top:28px;padding-top:22px;border-top:1px solid rgba(255,255,255,.1);}
.contact-social h5{margin-bottom:12px;font-weight:700;}
.contact-social-links{display:flex;gap:10px;}
.contact-social-links a{width:44px;height:44px;background:rgba(255,255,255,.1);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--white);font-size:1.1rem;transition:.3s;}
.contact-social-links a:hover{transform:translateY(-4px);}
.contact-social-links a.whatsapp:hover{background:#25D366;}
.contact-social-links a.linkedin:hover{background:#0077B5;}
.contact-social-links a.facebook:hover{background:#1877F2;}
.contact-social-links a.instagram:hover{background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);}
.contact-form-wrapper{background:var(--white);padding:48px;border-radius:24px;box-shadow:var(--shadow);}
.contact-form-wrapper h3{font-size:1.7rem;color:var(--dark);margin-bottom:8px;font-weight:800;}
.contact-form-wrapper .form-subtitle{color:var(--gray);margin-bottom:28px;font-size:.92rem;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.form-group{margin-bottom:18px;}
.form-group label{display:block;margin-bottom:7px;color:var(--dark);font-weight:600;font-size:.88rem;}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:14px 16px;border:2px solid var(--light-gray);border-radius:10px;font-size:.95rem;transition:.3s;font-family:inherit;background:var(--light);color:var(--dark);}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--primary);background:var(--white);box-shadow:0 0 0 4px rgba(30,64,175,.08);}
.form-group textarea{min-height:120px;resize:vertical;}

/* MAP */
.map-section{padding:0;}
.map-container{height:420px;}
.map-container iframe{width:100%;height:100%;border:none;}

/* FOOTER */
footer{background:var(--dark);color:var(--white);padding-top:80px;}
.footer-top{display:grid;grid-template-columns:2fr 1fr 1fr 1.5fr;gap:40px;padding-bottom:50px;border-bottom:1px solid rgba(255,255,255,.1);}
.footer-about h2{font-size:1.4rem;margin-bottom:8px;font-weight:800;}
.footer-about .tagline{font-family:'Playfair Display',serif;font-style:italic;color:var(--accent);margin-bottom:18px;}
.footer-about p{color:rgba(255,255,255,.65);line-height:1.8;margin-bottom:22px;font-size:.88rem;}
.footer-social{display:flex;gap:10px;}
.footer-social a{width:40px;height:40px;background:rgba(255,255,255,.08);border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--white);transition:.3s;font-size:1rem;}
.footer-social a:hover{transform:translateY(-4px);}
.footer-social a.whatsapp:hover{background:#25D366;}
.footer-social a.linkedin:hover{background:#0077B5;}
.footer-social a.facebook:hover{background:#1877F2;}
.footer-social a.instagram:hover{background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);}
.footer-links h4,.footer-contact h4{font-size:1rem;margin-bottom:22px;position:relative;padding-bottom:14px;font-weight:700;}
.footer-links h4::after,.footer-contact h4::after{content:'';position:absolute;bottom:0;left:0;width:36px;height:3px;background:var(--accent);}
.footer-links ul{list-style:none;}
.footer-links ul li{margin-bottom:10px;}
.footer-links ul li a{color:rgba(255,255,255,.65);text-decoration:none;font-size:.88rem;transition:.3s;display:flex;align-items:center;gap:8px;}
.footer-links ul li a:hover{color:var(--accent);padding-left:4px;}
.footer-links ul li a i{font-size:.6rem;color:var(--accent);}
.footer-contact-item{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px;}
.footer-contact-item i{color:var(--accent);margin-top:3px;font-size:1rem;}
.footer-contact-item p,.footer-contact-item a{color:rgba(255,255,255,.65);font-size:.88rem;text-decoration:none;line-height:1.6;}
.footer-contact-item a:hover{color:var(--accent);}
.footer-bottom{padding:22px 0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;font-size:.82rem;color:rgba(255,255,255,.4);}
.footer-bottom a{color:var(--accent);text-decoration:none;}

/* QUOTE MODAL */
.quote-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:9999;backdrop-filter:blur(4px);align-items:center;justify-content:center;}
.quote-modal.active{display:flex;}
.quote-modal-box{background:var(--white);border-radius:24px;padding:48px;max-width:600px;width:95%;max-height:90vh;overflow-y:auto;position:relative;animation:fadeInUp .4s ease;}
.quote-modal-box h3{font-size:1.8rem;color:var(--dark);margin-bottom:8px;font-weight:800;}
.quote-modal-box .modal-sub{color:var(--gray);margin-bottom:28px;font-size:.92rem;}
.modal-close{position:absolute;top:20px;right:20px;width:36px;height:36px;background:var(--light);border:none;border-radius:50%;cursor:pointer;font-size:1.1rem;color:var(--dark);display:flex;align-items:center;justify-content:center;transition:.3s;}
.modal-close:hover{background:var(--secondary);color:var(--white);}

/* WHATSAPP FLOAT */
.whatsapp-float{position:fixed;bottom:100px;right:28px;z-index:999;}
.whatsapp-float a{width:56px;height:56px;background:linear-gradient(135deg,#25D366,#128C7E);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--white);font-size:1.5rem;box-shadow:0 6px 20px rgba(37,211,102,.5);transition:.3s;animation:wa-pulse 2.5s ease infinite;}
.whatsapp-float a:hover{transform:scale(1.1);}
@keyframes wa-pulse{0%,100%{box-shadow:0 6px 20px rgba(37,211,102,.5);}50%{box-shadow:0 6px 35px rgba(37,211,102,.7),0 0 0 10px rgba(37,211,102,.1);}}

/* BACK TO TOP */
.back-to-top{position:fixed;bottom:30px;right:28px;width:48px;height:48px;background:var(--primary);color:var(--white);border:none;border-radius:12px;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 15px rgba(30,64,175,.4);transition:.3s;opacity:0;visibility:hidden;z-index:998;}
.back-to-top.visible{opacity:1;visibility:visible;}
.back-to-top:hover{background:var(--primary-dark);transform:translateY(-4px);}

/* RESPONSIVE */
@media(max-width:1024px){
  .hero-content{grid-template-columns:1fr;}
  .hero-image{display:none;}
  .about-content{grid-template-columns:1fr;}
  .about-image{display:none;}
  .contact-wrapper{grid-template-columns:1fr;}
  .footer-top{grid-template-columns:1fr 1fr;}
  .why-grid{grid-template-columns:repeat(2,1fr);}
  .wires-grid{grid-template-columns:repeat(2,1fr);}
  .panels-grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:768px){
  nav ul{display:none;flex-direction:column;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,255,255,.98);padding:80px 30px 30px;z-index:999;gap:5px;overflow-y:auto;}
  nav ul.active{display:flex;}
  .menu-toggle{display:flex;}
  .header-cta .btn-outline{display:none;}
  .services-grid{grid-template-columns:1fr;}
  .panels-grid{grid-template-columns:1fr;}
  .wires-grid{grid-template-columns:1fr 1fr;}
  .why-grid{grid-template-columns:1fr 1fr;}
  .footer-top{grid-template-columns:1fr;gap:30px;}
  .form-row{grid-template-columns:1fr;}
  section{padding:60px 0;}
  .contact-info{padding:30px;}
  .contact-form-wrapper{padding:30px;}
  .quote-modal-box{padding:30px;}
}

/* GALLERY GRID */
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;}
.gallery-item{position:relative;border-radius:16px;overflow:hidden;box-shadow:var(--shadow);cursor:pointer;aspect-ratio:4/3;}
.gallery-item img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease;}
.gallery-item:hover img{transform:scale(1.1);}
.gallery-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75),transparent 60%);display:flex;align-items:flex-end;padding:20px;opacity:0;transition:opacity .4s ease;}
.gallery-item:hover .gallery-overlay{opacity:1;}
.gallery-overlay span{color:var(--white);font-size:.88rem;font-weight:600;text-shadow:0 2px 8px rgba(0,0,0,.5);}

.footer-logo .footer-logo-text{display:flex;flex-direction:column;line-height:1.15;}

 // Mobile Menu Interface Actions toggle
 const mobileMenuBtn = document.getElementById('mobile-menu-btn');
 const navMenu = document.getElementById('nav-menu');

 mobileMenuBtn.addEventListener('click', function() {
 mobileMenuBtn.classList.toggle('active');
 navMenu.classList.toggle('active');
 });

 // Force close mobile menu upon node navigation engagement
 document.querySelectorAll('nav ul li a').forEach(link => {
 link.addEventListener('click', () => {
 mobileMenuBtn.classList.remove('active');
 navMenu.classList.remove('active');
 });
 });

 // Scroll Dynamic Event Interventions (Sticky Header and Top Button visibility thresholds)
 const scrollTopBtn = document.getElementById('scrollTopBtn');
 
 window.addEventListener('scroll', function() {
 if (window.scrollY > 400) {
 scrollTopBtn.classList.add('visible');
 } else {
 scrollTopBtn.classList.remove('visible');
 }
 });

 scrollTopBtn.addEventListener('click', function() {
 window.scrollTo({
 top: 0,
 behavior: 'smooth'
 });
 });

 // Interactive Estimate Popup Window Handlers
 const quoteModal = document.getElementById('quoteModal');

 function openModal() {
 quoteModal.classList.add('active');

 function closeModal() {
 quoteModal.classList.remove('active');
 document.body.style.overflow = ''; // unlocks regular scrolling loops
 }

 }
 });
