<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You - Parmod Electricals</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --primary:#1e40af;--primary-light:#3b82f6;--primary-dark:#1e3a8a;
  --secondary:#dc2626;--secondary-light:#ef4444;
  --accent:#f59e0b;--accent-light:#fbbf24;
  --dark:#1f2937;--light:#f8fafc;--white:#ffffff;--gray:#6b7280;
}
body{font-family:'Montserrat',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;background:linear-gradient(135deg,var(--light) 0%,#e0e7ff 50%,var(--light) 100%);padding:20px;}
.thanks-box{background:var(--white);border-radius:24px;padding:60px 50px;text-align:center;max-width:520px;width:100%;box-shadow:0 25px 60px rgba(0,0,0,.12);}
.thanks-icon{width:90px;height:90px;background:linear-gradient(135deg,#25D366,#128C7E);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 30px;font-size:2.5rem;color:var(--white);}
.thanks-box h1{font-size:2rem;color:var(--dark);margin-bottom:12px;font-weight:800;}
.thanks-box p{color:var(--gray);margin-bottom:10px;line-height:1.7;}
.thanks-box .highlight{color:var(--primary);font-weight:700;}
.thanks-contact{margin:30px 0;padding:24px;background:var(--light);border-radius:16px;text-align:left;}
.thanks-contact-item{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.thanks-contact-item:last-child{margin-bottom:0;}
.thanks-contact-item i{color:var(--primary);font-size:1.2rem;width:24px;text-align:center;}
.thanks-contact-item a{color:var(--dark);text-decoration:none;font-weight:600;}
.thanks-contact-item a:hover{color:var(--secondary);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;padding:14px 28px;border-radius:10px;text-decoration:none;font-weight:700;font-size:.95rem;transition:.3s;border:none;cursor:pointer;font-family:inherit;margin-top:10px;}
.btn-primary{background:linear-gradient(135deg,var(--secondary),var(--secondary-light));color:var(--white);box-shadow:0 4px 15px rgba(220,38,38,.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(220,38,38,.4);}
.btn-whatsapp{background:linear-gradient(135deg,#25D366,#128C7E);color:var(--white);box-shadow:0 4px 15px rgba(37,211,102,.3);}
.btn-whatsapp:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(37,211,102,.4);}
.btn-outline{background:transparent;color:var(--primary);border:2px solid var(--primary);}
.btn-outline:hover{background:var(--primary);color:var(--white);}
@media(max-width:768px){
  .thanks-box{padding:45px 30px;margin:15px;}
  .thanks-box h1{font-size:1.7rem;}
  .thanks-icon{width:75px;height:75px;font-size:2.2rem;margin-bottom:24px;}
  .thanks-contact{padding:20px;border-radius:14px;}
  .btn{padding:13px 24px;font-size:.9rem;width:100%;margin-top:6px;}
}
@media(max-width:480px){
  body{padding:15px;}
  .thanks-box{padding:35px 22px;border-radius:18px;}
  .thanks-box h1{font-size:1.5rem;margin-bottom:10px;}
  .thanks-box p{font-size:.88rem;}
  .thanks-icon{width:65px;height:65px;font-size:1.9rem;margin-bottom:22px;}
  .thanks-contact{padding:18px 16px;margin:22px 0;}
  .thanks-contact-item{gap:12px;margin-bottom:12px;}
  .thanks-contact-item i{font-size:1.1rem;}
  .thanks-contact-item a{font-size:.88rem;}
  .btn{padding:12px 20px;font-size:.88rem;border-radius:8px;}
}
@media(max-width:360px){
  .thanks-box{padding:30px 18px;}
  .thanks-box h1{font-size:1.3rem;}
  .thanks-icon{width:55px;height:55px;font-size:1.6rem;}
  .thanks-box p{font-size:.85rem;line-height:1.6;}
}
</style>
</head>
<body>
<div class="thanks-box">
  <div class="thanks-icon"><i class="fas fa-check"></i></div>
  <h1>Thank You!</h1>
  <p>Your message has been sent successfully to <span class="highlight">Parmod Electricals</span>.</p>
  <p>Our team will review your requirements and get back to you within <strong>24 hours</strong>.</p>
  <div class="thanks-contact">
    <div class="thanks-contact-item"><i class="fas fa-phone-alt"></i><a href="tel:+919315749453">+91 93157 49453</a></div>
    <div class="thanks-contact-item"><i class="fas fa-envelope"></i><a href="mailto:project@parmodelectricals.com">project@parmodelectricals.com</a></div>
    <div class="thanks-contact-item"><i class="fab fa-whatsapp"></i><a href="https://wa.me/919315749453" target="_blank">WhatsApp Us</a></div>
  </div>
  <a href="index.html" class="btn btn-outline"><i class="fas fa-arrow-left"></i> Back to Website</a>
  <a href="https://wa.me/919315749453?text=Hello, I just submitted a request on your website." class="btn btn-whatsapp" target="_blank"><i class="fab fa-whatsapp"></i> Chat on WhatsApp</a>
</div>
</body>
</html>
